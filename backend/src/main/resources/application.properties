# ── Servidor ──────────────────────────────────────────────
server.port=8080

# ── SQLite ────────────────────────────────────────────────
# Caminho configurável via env DB_PATH (Docker monta volume em /app/data)
# Local (sem Docker): cai no padrão "usermanager.db" na raiz do projeto
spring.datasource.url=jdbc:sqlite:${DB_PATH:usermanager.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# Desliga auto-configuração de Hibernate/JPA (não usamos)
spring.jpa.open-in-view=false

# ── Upload ────────────────────────────────────────────────
# Pasta das fotos, configurável via env UPLOAD_DIR (Docker monta volume em /app/uploads)
app.upload-dir=${UPLOAD_DIR:uploads}

# Limite de tamanho do multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── Log ───────────────────────────────────────────────────
logging.level.com.eyetec=DEBUG
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
